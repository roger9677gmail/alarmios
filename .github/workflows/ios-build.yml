name: Build iOS Native App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS .ipa
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor iOS Project
        run: npx cap sync ios

      # Forced unsigned xcodebuild is slightly tricky. We build an xcarchive and extract the Payload
      - name: Build unsigned .xcarchive
        run: |
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENTITLEMENTS_REQUIRED=YES

      - name: Package .ipa Payload
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -qr ios-alarm-app.ipa Payload
          cd ..

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-alarm-app.ipa
          path: build/ios-alarm-app.ipa
          retention-days: 7
